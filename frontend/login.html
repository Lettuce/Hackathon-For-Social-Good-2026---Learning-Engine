<!DOCTYPE html>
<html lang="en" xmlns="http://www.w3.org/1999/xhtml">

<head>
    <title>Hackathon Page - ZyBooks Seals</title>
    <meta charset="utf-8" />

    <link href="https://nrs-projects.humboldt.edu/~st10/styles/normalize.css"
          type="text/css" rel="stylesheet" />

    <link href="main.css" 
          type="text/css" rel="stylesheet" />

    <link href="login.css"
          type="text/css" rel="stylesheet" />

</head>

<body>
    <h1>Learning Engine</h1>
    <h2>Welcome to the Learning Engine. Please login or create an account.</h2>

    <fieldset><legend>Create Account</legend>
        <form method="post" id="createUserForm">
        <input type="text" name="username" id="usernameForNewAccount" placeholder="username">
        <label for="usernameForNewAccount">Enter your username</label>
        <input type="password" name="password" id="passwordForNewAccount" placeholder="password">
        <label for="passwordForNewAccount">Enter your password</label>

        <input type="submit" class="submit" value="Create Account" />
    </form></fieldset>

    <fieldset><legend>Log in</legend>
        <form method="post" id="logInForm">
        <input type="text" name="username" id="username" placeholder="username">
        <label for="username">Enter your username</label>
        <input type="password" name="password" id="password" placeholder="password">
        <label for="password">Enter your password</label>

        <input type="submit" class="submit" value="Log In" />
    </form></fieldset>
    

    <footer>
    </footer>
    <script src="login.js"></script>
</body>

</html>
